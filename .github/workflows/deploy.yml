name: Deploy Dashboard MFE

on:
  push:
    branches:
      - main
      - feature/deploy-triggers
  workflow_dispatch:

jobs:
  deploy:
    uses: fesleep-microfrontend-platform/github-workflows/.github/workflows/deploy-s3.yml@main
    permissions:
      id-token: write
      contents: read
      packages: read
    with:
      bucket_name: ${{ vars.BUCKET_NAME }}
      aws_region: ${{ vars.AWS_REGION }}
      app_name: ${{ vars.APP_NAME }}
      role_arn: ${{ vars.ROLE_ARN }}
      debug_npm_token: "true"
    secrets:
      NPM_GITHUB_TOKEN: ${{ secrets.NPM_GITHUB_TOKEN }}
